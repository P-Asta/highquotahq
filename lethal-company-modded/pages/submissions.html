<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions</title>
  <link rel="icon" type="image/png" href="/assets/lethal-company-modded-logo.png">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/submissions.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div id="footer-placeholder"></div>

  <div class="submission-form-container">
    <h1>Submit Your Run</h1>
    <form id="runSubmissionForm">
      <label for="modpack">Modpack</label>
      <select id="modpack" name="modpack">
        <option value="lc_modded_brutal_" selected>Brutal Company</option>
        <option value="lc_modded_eclipsed_">Eclipsed Only</option>
        <option value="lc_modded_wesleysmoons_">Wesley's Moons</option>
        <option value="lc_modded_classicmoons_">Classic Moons</option>
      </select>
      <label for="leaderboardType">Leaderboard Type</label>
      <select id="leaderboardType" name="leaderboardType">
        <option value="hq" selected>Classic High Quota</option>
        <option value="smhq">Single Moon High Quota</option>
        <option value="sdc">Single Day Clear</option>
      </select>
    
      <!-- HQ Fields -->
      <div id="hqFields">
        <label for="quotaAmount">Quota Amount</label>
        <input type="number" id="quotaAmount" name="quotaAmount" placeholder="Enter the quota amount">

        <label for="quotaFulfilled">Quota Fulfilled</label>
        <input type="number" id="quotaFulfilled" name="quotaFulfilled" placeholder="Enter quota fulfilled">

        <label for="quotaReached">Number of Quotas Reached</label>
        <input type="number" id="quotaReached" name="quotaReached" placeholder="Enter quota reached">

        <label for="totalScrap">Total Scrap</label>
        <input type="number" id="totalScrap" name="totalScrap" placeholder="Enter total scrap collected">
      </div>

      <!-- SDC Fields -->
      <div id="sdcFields" style="display:none;">
        <label for="moon">Moon</label>
        <select id="moon" name="moon">
          <option value="">Select a moon</option>
        </select>

        <label for="scrapType">Scrap Type</label>
        <select id="scrapType" name="scrapType">
          <option value="">Select scrap type</option>
          <option value="Regular">Regular</option>
          <option value="Single">Single</option>
        </select>

        <label for="totalScrapSDC">Total Scrap</label>
        <input type="number" id="totalScrapSDC" name="totalScrapSDC" placeholder="Enter total scrap collected">

        <label for="equipment">Equipment</label>
        <br>
        <sub>Select the equipment used in the run that is the highest in the dropdown list.</sub>
        <br>
        <sub>Company Cruiser -> Jetpack -> TZP -> Shovel -> Miscellaneous -> None</sub>
        <br>
        <select id="equipment" name="equipment">
          <option value="Company Cruiser">Company Cruiser</option>
          <option value="Jetpack">Jetpack</option>
          <option value="TZP">TZP</option>
          <option value="Shovel">Shovel</option>
          <option value="Miscellaneous">Miscellaneous</option>
          <option value="None">None</option>
        </select>
      </div>

      <!-- SMHQ Fields -->
      <div id="smhqFields" style="display:none;">
        <label for="moonSMHQ">Moon</label>
        <select id="moonSMHQ" name="moonSMHQ">
          <option value="">Select a moon</option>
        </select>

        <label for="quotaAmountSMHQ">Quota Amount</label>
        <input type="number" id="quotaAmountSMHQ" name="quotaAmountSMHQ" placeholder="Enter the quota amount">

        <label for="quotaFulfilledSMHQ">Quota Fulfilled</label>
        <input type="number" id="quotaFulfilledSMHQ" name="quotaFulfilledSMHQ" placeholder="Enter quota fulfilled">

        <label for="quotaReachedSMHQ">Quota Reached</label>
        <input type="number" id="quotaReachedSMHQ" name="quotaReachedSMHQ" placeholder="Enter quota reached">

        <label for="totalScrapSMHQ">Total Scrap</label>
        <input type="number" id="totalScrapSMHQ" name="totalScrapSMHQ" placeholder="Enter total scrap collected">
      </div>

    
      <!-- Date Input -->
      <label for="date">Date</label>
      <input type="date" id="date" name="date" required>
    
      <div id="playerFields"></div>
      <button type="button" id="addPlayerBtn" class="add-player-btn">+ Add another player 👤</button>
      
      <label for="version">Version</label>
      <select id="version" name="version" required>
        <option value="" disabled selected>Select a version</option>
      </select>

      <label for="logs">Logs</label>
      <textarea id="logs" name="logs" placeholder="Enter link to log files. Make sure the logs are viewable to anyone."></textarea>

      <label for="spreadsheet">Spreadsheet</label>
      <textarea id="spreadsheet" name="spreadsheet" placeholder="Enter spreadsheet link here. Make sure it's viewable to anyone."></textarea>

      <label for="publicComments">Public Comments</label>
      <textarea id="publicComments" name="publicComments" placeholder="Enter comments that can be viewed by anyone."></textarea>

      <label for="comments">Additional Notes</label>
      <textarea id="comments" name="comments" placeholder="Enter notes that can only be viewed by verifiers and managers."></textarea>
      
      <button type="submit">Submit Run</button>
    </form>
  </div>

  <script type="module" src="../js/submissions.js"></script>
  <script type="module" src="../js/firebase.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
