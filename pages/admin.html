<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="icon" type="image/png" href="/assets/high-quota-logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div id="footer-placeholder"></div>
    

        <div class="admin-container">
            <div id="sidebar" class="sidebar">
                <button id="admin-btn" class="sidebar-btn">Admin</button>
                <button id="verifier-btn" class="sidebar-btn">Verifier</button>
                <button id="modded-verifier-btn" class="sidebar-btn">Modded Verifier</button>
                <button id="recent-verified-runs-btn" class="sidebar-btn">Recently Verified Runs</button>
            </div>
        
            <!-- admin interface -->
            <div id="admin-placeholder">
                <section id="admin-interface" class="admin-section">
                    <h2>Admin Controls</h2>

                    <div class="input-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
            
                    <div class="input-group">
                        <label for="role">Role:</label>
                        <select id="role">
                            <option value="admin">Admin</option>
                            <option value="verifier">Verifier</option>
                            <option value="modded-verifier">Modded Verifier</option>
                        </select>
                    </div>
            
                    <div class="button-group">
                        <button id="assign-roles-button">Assign Role</button>
                        <button id="remove-role-button">Remove Role</button>
                        <button id="ban-user-button">Ban User</button>
                        <button id="unban-user-button">Unban User</button>
                    </div>
            
                    <div id="feedback"></div>
                </section>
        
                <!-- verifier interface -->
                <section id="verifier-interface" class="admin-section">
                    <h2>Main Board Queue</h2>
                    <hr>
                    <div id="run-list">
                    </div>

                    <div id="run-details-container" style="display: none;">
                    </div>
                </section>
        
                <!-- modded verifier interface -->
                <section id="modded-verifier-interface" class="admin-section">
                    <h2>Modded Board Queue</h2>
                    <hr>
                    <div id="modded-run-list">
                    </div>

                    <div id="modded-run-details-container" style="display: none;">
                    </div>
                </section>

                <section id="recent-verified-runs-interface" class="admin-section">
                    <div id="recent-verified-runs-section">
                        <h3>Recently Verified Runs</h3>
                        <table id="recent-verified-runs">
                            <thead>
                                <tr>
                                    <th>Run ID</th>
                                    <th>Verified By</th>
                                    <th>Verified At</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- dynamic content -->
                            </tbody>
                        </table>
                    </div>
                </section>

            </div>
        </div>
      

    <script type="module" src="../js/admin.js"></script>
    <script type="module" src="../js/index.js"></script>
    <script type="module" src="../js/firebase.js"></script>
</body>
</html>
